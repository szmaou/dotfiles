[main]
include = "~/.config/fuzzel/colors.ini"
font=Google Sans:size=12:weight=medium
use-bold=true
icon-theme=Papirus-Dark
terminal=kitty -1
prompt="❯  " 
launch-prefix=runapp
horizontal-pad=10
vertical-pad=5
inner-pad=4
line-height=20
letter-spacing=0.5

[border]
radius=10
selection-radius=5
width=1

[key-bindings]
delete-next=Delete
custom-1=Control+d
custom-10=Control+Shift+d
